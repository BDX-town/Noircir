server {
    listen 8080;

    root $NGINX_FOLDER;
    charset utf-8;

    client_max_body_size 0;
    create_full_put_path on;
    autoindex_exact_size off;
    autoindex_localtime on;
    port_in_redirect off;

    try_files $uri $uri/ /index.html;

    # 1) Bloquer l'accès générique à /$BLOGS_FOLDER
    location = /$BLOGS_FOLDER {
        return 403;
    }

    # 2) Ressources publiques : /$BLOGS_FOLDER/<user>/ressources/*
    location ~ ^/$BLOGS_FOLDER/[^/]+/ressources/ {
        auth_basic off;
        try_files $uri =404;
    }

    # 3) Protection et WebDAV pour les endpoints utilisateurs
    #    (match /$BLOGS_FOLDER/<username>/... )
    location ~ ^/$BLOGS_FOLDER/(?<username>[^/]+)(/.*)?$ {
        # Répondre aux préflights CORS (OPTIONS) sans auth
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "*" always;
            return 204;
        }

        # Auth basic (realm statique) ; fichier htpasswd : /$NGINX_FOLDER/$BLOGS_FOLDER/<username>/.auth.allow
        auth_basic "Restricted";
        auth_basic_user_file $NGINX_FOLDER/$BLOGS_FOLDER/$username/.auth.allow;

        # L'utilisateur authentifié doit être le même que username (sinon 403)
        if ($remote_user != $username) {
            return 403;
        }

        # Activer DAV pour les méthodes voulues
        dav_methods PUT DELETE MKCOL COPY MOVE;
        dav_ext_methods PROPFIND OPTIONS;
        dav_access user:rw group:rw all:r;

        # Fichier spécial index.md : interdit
        location ~ ^/$BLOGS_FOLDER/[^/]+/index\.md$ {
            deny all;
            return 403;
        }

        # Endpoint password (génération de hash APR1 via Lua)
        location ~ ^/$BLOGS_FOLDER/[^/]+/password$ {
            lua_need_request_body on;
            add_header Content-Type "text/plain" always;

            if ($request_method = OPTIONS) {
                return 200;
            }

            content_by_lua_block {
                local password = ngx.req.get_body_data()
                if not password then
                    ngx.status = 400
                    ngx.say("Missing password")
                    return
                end

                -- échappement simple des quotes pour appel shell
                local safe_pwd = password:gsub("'", "'\\''")
                local handle = io.popen("echo -n '" .. safe_pwd .. "' | openssl passwd -apr1 -stdin")
                local result = handle:read("*a"):gsub('[\n\r]', '')
                handle:close()
                ngx.say(result)
            }
        }
    }

    # (Autres location généraux / index etc. peuvent rester ici)
}
